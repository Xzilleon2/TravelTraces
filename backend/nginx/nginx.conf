map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

limit_req_zone $binary_remote_addr zone=api_rate:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=login_rate:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=ws_rate:10m rate=5r/s;

upstream api_backend {
  server api:8000;
  keepalive 32;
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;
  client_max_body_size 10m;
  keepalive_timeout 65s;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/xml
    image/svg+xml
    text/css
    text/plain
    text/xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), geolocation=(self), microphone=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.maptiler.com https://*.maptiler.com https://router.project-osrm.org https://nominatim.openstreetmap.org https://photon.komoot.io https://*.tile.openstreetmap.org https://server.arcgisonline.com wss: ws:; img-src 'self' data: blob: https://api.maptiler.com https://*.maptiler.com https://*.tile.openstreetmap.org https://server.arcgisonline.com https://images.unsplash.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://api.maptiler.com https://*.maptiler.com https://fonts.gstatic.com; script-src 'self'; worker-src 'self' blob:; media-src 'self' blob: data:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /api/auth/login {
    limit_req zone=login_rate burst=5 nodelay;
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 30s;
  }

  location /api/ {
    limit_req zone=api_rate burst=60 nodelay;
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
  }

  location /ws/ {
    limit_req zone=ws_rate burst=20 nodelay;
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, must-revalidate" always;
  }
}
