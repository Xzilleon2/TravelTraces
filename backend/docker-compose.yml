name: travelplaces

services:
  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      APP_ENV: production
      API_CORS_ORIGINS: http://localhost:8080
      OSRM_URL: https://router.project-osrm.org
      NOMINATIM_URL: https://nominatim.openstreetmap.org
      PHOTON_URL: https://photon.komoot.io
      REGION_HINT: Philippines
      WS_SESSION_SECRET: ${WS_SESSION_SECRET:-replace-this-before-production}
      WS_TOKEN_TTL_S: 3600
      REDIS_URL: redis://redis:6379/0
      AUTH_SECRET: ${AUTH_SECRET:-replace-this-before-production}
      AUTH_COOKIE_SECURE: "true"
      AUTH_TOKEN_TTL_S: 3600
      REQUIRE_AUTH: ${REQUIRE_AUTH:-false}
      BOOTSTRAP_USER_EMAIL: ${BOOTSTRAP_USER_EMAIL:-}
      BOOTSTRAP_USER_ID: ${BOOTSTRAP_USER_ID:-}
      BOOTSTRAP_USER_PASSWORD_HASH: ${BOOTSTRAP_USER_PASSWORD_HASH:-}
      BOOTSTRAP_USER_GROUP_IDS: ${BOOTSTRAP_USER_GROUP_IDS:-}
      MAX_REQUEST_BYTES: 1048576
      CHAT_MODEL_URL: ${CHAT_MODEL_URL:-}
      CHAT_MODEL_API_KEY: ${CHAT_MODEL_API_KEY:-}
      CHAT_MODEL_TIMEOUT_S: ${CHAT_MODEL_TIMEOUT_S:-60}
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    cpus: 0.75
    networks:
      - internal

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 160m
    cpus: 0.25
    networks:
      - internal

  web:
    build:
      context: ..
      dockerfile: backend/docker/frontend.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: 0.50
    networks:
      - edge
      - internal

volumes:
  api-data:

networks:
  edge:
  internal:
    internal: true
